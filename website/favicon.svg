<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      body { margin: 0; padding: 0; }
      .infinity-symbol {
        font-size: 70px;
        font-weight: bold;
        fill: #004688;
        dominant-baseline: central;
        text-anchor: middle;
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" fill="#ffffff"/>
  
  <!-- Infinity Symbol ♾️ -->
  <text x="50" y="50" class="infinity-symbol">♾️</text>
</svg>